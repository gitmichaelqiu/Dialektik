name: dialektik_flutter_ui
description: Flutter UI layer for Dialektik backed by the existing JavaScript engine.
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  auto_updater: ^1.0.0
  shared_preferences: ^2.5.5
  flutter_inappwebview: ^6.1.5
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/engine.html
    - assets/engine.js
